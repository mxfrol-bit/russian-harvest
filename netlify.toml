# Netlify deploy configuration — Русский Урожай
# ================================================
# Deploy: connect this repo to Netlify, it auto-detects this file.
# Alternative: netlify deploy --prod --dir=site

[build]
  command = "python3 scripts/build.py"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

# Pretty URLs: /catalog → /catalog.html
[[redirects]]
  from = "/catalog"
  to = "/catalog.html"
  status = 200
[[redirects]]
  from = "/product"
  to = "/product.html"
  status = 200
[[redirects]]
  from = "/sale"
  to = "/sale.html"
  status = 200
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200
[[redirects]]
  from = "/how"
  to = "/how.html"
  status = 200
[[redirects]]
  from = "/contacts"
  to = "/contacts.html"
  status = 200
[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200
[[redirects]]
  from = "/offer"
  to = "/offer.html"
  status = 200
[[redirects]]
  from = "/regulations"
  to = "/regulations.html"
  status = 200
[[redirects]]
  from = "/policy"
  to = "/policy.html"
  status = 200
[[redirects]]
  from = "/dispute"
  to = "/dispute.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://russian-harvest.ru; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.russian-harvest.ru; frame-ancestors 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
