# Nginx configuration for Русский Урожай
# =======================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml application/xml+rss
        application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;

    # Pretty URLs — /catalog → /catalog.html
    location = /catalog { try_files /catalog.html =404; }
    location = /product { try_files /product.html =404; }
    location = /sale { try_files /sale.html =404; }
    location = /about { try_files /about.html =404; }
    location = /how { try_files /how.html =404; }
    location = /contacts { try_files /contacts.html =404; }
    location = /account { try_files /account.html =404; }
    location = /offer { try_files /offer.html =404; }
    location = /regulations { try_files /regulations.html =404; }
    location = /policy { try_files /policy.html =404; }
    location = /dispute { try_files /dispute.html =404; }

    # Static assets — long cache
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — short cache
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Main routing
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 404 fallback
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Hide dotfiles
    location ~ /\. { deny all; }
}
