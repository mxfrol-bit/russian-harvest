<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Стилизованная "Р" с колоском -->
  <g>
    <!-- Окружность "Р" -->
    <path d="M 40 16 L 40 64 M 40 16 L 56 16 C 65 16 72 23 72 32 C 72 41 65 48 56 48 L 40 48"
          stroke="#96A196" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Колосок внутри "Р" -->
    <g stroke="#97C524" stroke-width="2.2" stroke-linecap="round" fill="none">
      <!-- стебель -->
      <line x1="52" y1="56" x2="52" y2="22"/>
      <!-- листья -->
      <path d="M 52 38 Q 47 35 44 30"/>
      <path d="M 52 38 Q 57 35 60 30"/>
      <path d="M 52 32 Q 47 29 44 24"/>
      <path d="M 52 32 Q 57 29 60 24"/>
      <path d="M 52 26 Q 48 23 46 19"/>
      <path d="M 52 26 Q 56 23 58 19"/>
      <!-- верхушка -->
      <path d="M 52 22 Q 52 18 52 16"/>
    </g>
  </g>
  <!-- Текст "РУССКИЙ УРОЖАЙ" -->
  <g fill="#96A196" font-family="'Manrope', sans-serif" font-weight="700" letter-spacing="0.02em">
    <text x="92" y="36" font-size="22">РУССКИЙ</text>
    <text x="92" y="62" font-size="22">УРОЖАЙ</text>
  </g>
  <!-- TM значок -->
  <g>
    <circle cx="232" cy="20" r="7" stroke="#96A196" stroke-width="1" fill="none"/>
    <text x="232" y="23.5" fill="#96A196" font-family="'Manrope', sans-serif" font-size="7" font-weight="600" text-anchor="middle">TM</text>
  </g>
</svg>
