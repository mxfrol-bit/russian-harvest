version: '3.8'

services:
  web:
    build: .
    image: russian-harvest:latest
    container_name: russian-harvest
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

